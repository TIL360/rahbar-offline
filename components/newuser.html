<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add System User | POS 2026</title>
    <style>
        :root { --primary: #5d4037; --bg: #fdf0d5; --white: #ffffff; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        
        .container { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2, h3 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        button.save-btn { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* Table Styling */
        .user-list-section { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid var(--primary); color: #333; }
        td { padding: 12px; border-bottom: 1px solid #eee; color: #555; vertical-align: middle; }
        tr:hover { background-color: #fffaf0; }

        .del-btn { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .del-btn:hover { background: #c0392b; }
        
        .back-link { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>👤 Add System User</h2>
        <form id="userForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="save-btn">Save User</button>
        </form>
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>

        <div class="user-list-section">
            <h3>Existing Users</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th style="text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Load users on page open
        document.addEventListener('DOMContentLoaded', loadUsers);

        async function loadUsers() {
            const tableBody = document.getElementById('userTableBody');
            try {
                const users = await window.authAPI.getAllUsers();
                tableBody.innerHTML = users.map(user => `
                    <tr>
                        <td>#${user.id}</td>
                        <td><strong>${user.username}</strong></td>
                        <td style="text-align: right;">
                            ${user.username === 'admin' ? '<i>System</i>' : 
                            `<button class="del-btn" onclick="deleteUser(${user.id})">Delete</button>`}
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error(err); }
        }

        document.getElementById('userForm').onsubmit = async (e) => {
            e.preventDefault();
            const userData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            const res = await window.authAPI.addUser(userData);
            if(res.success) {
                alert("User Added!");
                document.getElementById('userForm').reset();
                loadUsers(); // Refresh list
            }
        };

        async function deleteUser(id) {
            if(confirm("Are you sure you want to delete this user?")) {
                const res = await window.authAPI.deleteUser(id);
                if(res.success) loadUsers();
                else alert("Error: " + res.error);
            }
        }
    </script>
</body>
</html>
