<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --white: #ffffff; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        .back-link { text-decoration: none; color: var(--accent); font-weight: bold; margin-bottom: 15px; display: inline-block; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h2 { color: var(--primary); margin: 0; }

        /* Form Container */
        .staff-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        .btn-save { width: 100%; background: var(--success); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-save:hover { background: #219150; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .status-pill { padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .active { background: #d4edda; color: #155724; }
        .inactive { background: #f8d7da; color: #721c24; }

        .btn-action { border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; margin-right: 3px; }
        .edit { background: #3498db; color: white; }
        .delete { background: var(--danger); color: white; }
    </style>
</head>
<body>
<!-- 
    <a href="../dashboard.html" class="back-link">← Back to Dashboard</a> -->
    
    <div class="header">
    <h2>Staff Management</h2>
    <div>
        <button class="btn-apply" onclick="window.location.href='../dashboard.html'" style="background: #020e7c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px;">Dashboard</button>
        <button class="btn-apply" onclick="window.location.href='salary.html'" style="background: #d8da7a; color: rgb(5, 5, 5); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px;">💵 Salary</button>
        <button onclick="openSalaryModal()" style="background: #e67e22; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px;">💰 Initiate Salary</button>
        <span id="staffStats" style="font-weight: bold; color: var(--primary);">Total Staff: <span id="countText">0</span></span>
    </div>
</div> 

    <div class="staff-grid">
        <!-- Add/Edit Section -->
        <div class="card">
            <h3 style="margin-top:0">Add New Staff</h3>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="staffName" placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label>CNIC / ID Number</label>
                <input type="text" id="staffCnic" placeholder="xxxxx-xxxxxxx-x">
            </div>
            <div class="form-group">
                <label>Contact Number</label>
                <input type="text" id="staffContact" placeholder="03xx-xxxxxxx">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1">
                    <label>Designation</label>
                    <input type="text" id="staffRole" placeholder="e.g. Teacher">
                </div>
                <div class="form-group" style="flex:1">
                    <label>Status</label>
                    <select id="staffStatus">
                        <option value="Active">Active</option>
                        <option value="Inactive">On Leave</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Date of Appointment</label>
                <input type="date" id="staffDoj">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1">
                    <label>Basic Salary</label>
                    <input type="number" id="staffSalary" placeholder="0">
                </div>
                <div class="form-group" style="flex:1">
                    <label>Allowances</label>
                    <input type="number" id="staffAllowance" placeholder="0">
                </div>
            </div>
            <button class="btn-save" onclick="saveStaff()">Add Staff Member</button>
        </div>

        <!-- Staff List Section -->
        <div class="card" style="overflow-x: auto; padding: 0;">
            <table>
                <thead>
                    <tr>
                        <th>Name & Designation</th>
                        <th>CNIC</th>
                        <th>Contact</th>
                        <th>Salary Details</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="staffTableBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Simple Salary Modal -->
<div id="salaryModal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div class="card" style="width: 300px;">
        <h3>Initiate Salary</h3>
        <div class="form-group">
            <label>Month</label>
            <select id="salMonth" class="nice-select" style="width: 100%;">
                <option value="January">January</option><option value="February">February</option>
                <option value="March">March</option><option value="April">April</option>
                <option value="May">May</option><option value="June">June</option>
                <option value="July">July</option><option value="August">August</option>
                <option value="September">September</option><option value="October">October</option>
                <option value="November">November</option><option value="December">December</option>
            </select>
        </div>
        <div class="form-group">
            <label>Year</label>
            <input type="number" id="salYear" value="2026">
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="processSalary()" class="btn-save">Generate</button>
            <button onclick="closeSalaryModal()" style="background:#95a5a6;" class="btn-save">Cancel</button>
        </div>
    </div>
</div>
<script>
    let editMode = false;
    let currentEditId = null;

    // Load list on page start
    document.addEventListener('DOMContentLoaded', loadStaff);

    async function loadStaff() {
        try {
            const staff = await window.api.getStaff();
            const tableBody = document.getElementById('staffTableBody');
            tableBody.innerHTML = '';
            
            staff.forEach(s => {
                // We stringify the object so startEdit can receive the full data
                const staffData = JSON.stringify(s).replace(/"/g, '&quot;');
                
                tableBody.innerHTML += `
                    <tr>
                        <td><strong>${s.name}</strong><br><small>${s.designation}</small></td>
                        <td>${s.cnic}</td>
                        <td>${s.contact}</td>
                        <td>Bas: ${s.salary}<br>All: ${s.allowance}</td>
                        <td><span class="status-pill ${s.status.toLowerCase()}">${s.status}</span></td>
                        <td>
                            <button class="btn-action edit" onclick="startEdit('${staffData}')">✎ Edit</button>
                            <button class="btn-action delete" onclick="removeStaff(${s.id})">✖ Delete</button>
                        </td>
                    </tr>`;
            });
            document.getElementById('countText').innerText = staff.length;
        } catch (error) {
            console.error("Failed to load staff:", error);
        }
    }

    // --- EDIT: Fill the form with existing data ---
    function startEdit(staffJson) {
        const staff = JSON.parse(staffJson);
        editMode = true;
        currentEditId = staff.id;

        // Fill the inputs
        document.getElementById('staffName').value = staff.name;
        document.getElementById('staffCnic').value = staff.cnic;
        document.getElementById('staffContact').value = staff.contact;
        document.getElementById('staffRole').value = staff.designation;
        document.getElementById('staffDoj').value = staff.doj;
        document.getElementById('staffSalary').value = staff.salary;
        document.getElementById('staffAllowance').value = staff.allowance;
        document.getElementById('staffStatus').value = staff.status;

        // Update UI Button
        const btn = document.querySelector('.btn-save');
        btn.innerText = "Update Staff Member";
        btn.style.background = "#3498db"; // Change color to Blue for edit
        
        // Scroll to form
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- SAVE: Handle both Insert and Update ---
    async function saveStaff() {
        const data = {
            name: document.getElementById('staffName').value,
            cnic: document.getElementById('staffCnic').value,
            contact: document.getElementById('staffContact').value,
            designation: document.getElementById('staffRole').value,
            doj: document.getElementById('staffDoj').value,
            salary: parseFloat(document.getElementById('staffSalary').value) || 0,
            allowance: parseFloat(document.getElementById('staffAllowance').value) || 0,
            status: document.getElementById('staffStatus').value
        };

        if (!data.name || !data.cnic) {
            alert("Please enter at least Name and CNIC.");
            return;
        }

        if (editMode) {
            await window.api.updateStaff(currentEditId, data);
            alert("Staff updated successfully!");
        } else {
            await window.api.addStaff(data);
            alert("Staff added successfully!");
        }
        clearForm();
        loadStaff();
        location.reload();
    }

    // --- DELETE: Remove record ---
    async function removeStaff(id) {
        if (confirm("Are you sure you want to delete this staff record?")) {
            await window.api.deleteStaff(id);
            loadStaff();
        }
    }

    // --- HELPER: Clear Form and Reset Mode ---
    function clearForm() {
        editMode = false;
        currentEditId = null;
        
        // Clear all inputs
        document.querySelectorAll('.card input').forEach(i => i.value = '');
        document.getElementById('staffStatus').value = 'Active';
        
        // Reset Button
        const btn = document.querySelector('.btn-save');
        btn.innerText = "Add Staff Member";
        btn.style.background = "var(--success)";
    }
function openSalaryModal() {
    document.getElementById('salaryModal').style.display = 'flex';
}

function closeSalaryModal() {
    document.getElementById('salaryModal').style.display = 'none';
}

async function processSalary() {
    const month = document.getElementById('salMonth').value;
    const year = document.getElementById('salYear').value;

    const result = await window.api.initiateSalary(month, year);
    
    if (result.success) {
        alert(`Successfully initiated salary for ${month} ${year}. ${result.count} records added.`);
    } else {
        alert(result.message); // This will show if record already exists
    }
    closeSalaryModal();
}
    
</script>

</body>
</html>
