<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices </title>
    <style>
        /* Base Styling */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f0f0f0; color: #333; }
        
        /* Landscape Page Wrapper: One wrapper per student */
        .page-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* 3 Copies side-by-side */
            gap: 12px;
            width: 297mm; 
            min-height: 200mm;
            margin: 15px auto;
            background: white;
            padding: 10px;
            box-sizing: border-box;
            page-break-after: always;
            border: 1px solid #ccc;
        }

        .copy-section {
            border: 1.5px dashed #555;
            padding: 10px;
            font-size: 10.5px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header Styling */
        .header { text-align: center; border-bottom: 2px solid #2c3e50; margin-bottom: 8px; padding-bottom: 5px; }
        .school-name { font-size: 15px; font-weight: bold; margin: 0; text-transform: uppercase; }
        .copy-label { background: #eee; padding: 2px 6px; font-weight: bold; float: right; border-radius: 3px; font-size: 9px; }
        
        .info-table, .fee-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        .info-table td { padding: 2px 0; }
        .fee-table th, .fee-table td { border: 1px solid #ddd; padding: 4px; text-align: left; }
        .fee-table th { background: #f9f9f9; }
        
        .total-row { font-weight: bold; background: #f2f2f2; }
        .net-payable { background: #2c3e50 !important; color: white !important; font-weight: bold; }
        .fine-row { color: #c0392b; font-style: italic; }
        
        .footer { margin-top: auto; display: flex; justify-content: space-between; padding-top: 15px; }
        .sig-line { border-top: 1.2px solid #000; width: 75px; text-align: center; font-size: 9px; padding-top: 3px; }

        .no-print { text-align:center; padding: 15px; background: #2c3e50; color:white; }
        .btn-print { padding: 10px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; border:none; background:#27ae60; color:white; margin-bottom: 5px; }
        .btn-close { background: #e74c3c; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
   
        /* Small Logo next to Name */
        .small-logo {
            height: 28px; /* Matches text height */
            vertical-align: middle;
            margin-right: 8px;
        }
           /* Watermark Logo Styling */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; /* Adjust size to match the image */
            opacity: 0.12; /* Faint enough for readability */
            z-index: 0;
            pointer-events: none;
        }


        /* Print Specifics */
        @media print {
            body { background: white; }
            .no-print { display: none; }
            .page-wrapper { margin: 0; border: none; padding: 5mm; }
            @page { size: landscape; margin: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <button class="btn-print" onclick="window.print()">🖨️ Click to Print Invoices</button>
    <button class="btn-close" onclick="window.close()">Close Window</button>
    <p id="counterNote" style="margin: 8px 0 0 0; font-size: 13px; opacity: 0.9;">Initializing...</p>
</div>

<div id="invoiceContainer">
    <!-- Student Pages will be injected here -->
    <div style="text-align: center; padding: 100px; color: #777;">
        <h3>Loading Invoice Data...</h3>
    </div>
</div>

<script>
async function init() {
    const container = document.getElementById('invoiceContainer');
    const counterNote = document.getElementById('counterNote');

    // 1. Safety Check: Is the Electron Bridge (window.api) loaded?
    if (!window.api || !window.api.getFeeRecordById) {
        container.innerHTML = `
            <div style="text-align:center; padding:50px; color:#c0392b;">
                <h2>API Error</h2>
                <p>The database connection (window.api) was not found in this window.</p>
                <p>Ensure your Electron main process has 'preload' enabled for child windows.</p>
            </div>`;
        return;
    }

    // 2. Get IDs from URL
    const params = new URLSearchParams(window.location.search);
    const idString = params.get('ids') || params.get('id');

    if (!idString) {
        container.innerHTML = "<h2 style='text-align:center; padding:50px;'>No Record IDs provided in URL.</h2>";
        return;
    }

    const ids = idString.split(',');
    container.innerHTML = ''; // Clear loading message
    counterNote.innerText = `Total Students in Batch: ${ids.length}`;

    // 3. Loop through and fetch records
    for (let id of ids) {
        try {
            const data = await window.api.getFeeRecordById(parseInt(id));
            if (data) {
                renderStudentPage(data, container);
            } else {
                console.warn(`No data returned for ID: ${id}`);
            }
        } catch (err) {
            console.error(`Error loading record ID ${id}:`, err);
        }
    }

    if (container.innerHTML === '') {
        container.innerHTML = "<h2 style='text-align:center; padding:50px;'>Records could not be loaded from database.</h2>";
    }
}

function renderStudentPage(data, container) {
    const copies = ['Bank Copy', 'Office Copy', 'Student Copy'];
    const page = document.createElement('div');
    page.className = 'page-wrapper';

    // Calculations
    const monthly = Number(data.monthly_fee) || 0;
    const admission = Number(data.adm_fee) || 0;
    const exam = Number(data.exam_fee) || 0;
    const misc = Number(data.misc_fee) || 0;
    const lab = Number(data.lab_fee) || 0;
    const arrears = Number(data.previous_arrears) || 0;
    
    const currentTotal = monthly + admission + exam + misc + lab;
    const netPayable = currentTotal + arrears;
    const fineAmount = 200; 
    const netAfterDue = netPayable + fineAmount;
    const dueDate = `10th ${data.invoice_month} ${data.invoice_year}`;

    page.innerHTML = copies.map(title => `
        <div class="copy-section">
                        <img src="../../images/logo.png" class="watermark">
            <span class="copy-label">${title}</span>
            <div class="header">
                <p class="school-name">
                                        <img src="../../images/logo.png" class="small-logo">
                    RAHBAR PUBLIC SCHOOL & COLLEGE</p>
                <p style="margin:2px; font-size:9px;">Garhi Habibullah | Phone: 0315-1436832</p>
            </div>
            <table class="info-table">
                <tr>
                    <td><strong>Inv #:</strong> ${data.id}</td>
                    <td style="text-align:right"><strong>Month:</strong> ${data.invoice_month}</td>
                </tr>
                <tr>
                    <td colspan="2"><strong>Student:</strong> ${data.student_name}</td>
                    <td colspan="2"><strong>Father:</strong> ${data.father_name}</td>
                </tr>
                <tr>
                    <td><strong>Reg:</strong> ${data.registration_no}</td>
                    <td><strong>Class:</strong> ${data.current_class} (${data.section || 'N/A'})</td>
                </tr>
            </table>
            <table class="fee-table">
                <thead><tr><th>Description</th><th>Amount</th></tr></thead>
                <tbody>
                    <tr><td>Monthly Tuition Fee</td><td>${monthly.toLocaleString()}</td></tr>
                    ${admission > 0 ? `<tr><td>Admission Fee</td><td>${admission.toLocaleString()}</td></tr>` : ''}
                    ${exam > 0 ? `<tr><td>Examination Fee</td><td>${exam.toLocaleString()}</td></tr>` : ''}
                    ${lab > 0 ? `<tr><td>Lab Charges</td><td>${lab.toLocaleString()}</td></tr>` : ''}
                    ${misc > 0 ? `<tr><td>Miscellaneous Fee</td><td>${misc.toLocaleString()}</td></tr>` : ''}
                    <tr class="total-row"><td>Current Month Total</td><td>${currentTotal.toLocaleString()}</td></tr>
                    <tr><td>Previous Arrears</td><td>${arrears.toLocaleString()}</td></tr>
                    <tr class="net-payable">
                        <td>NET PAYABLE (By ${dueDate})</td>
                        <td>Rs. ${netPayable.toLocaleString()}</td>
                    </tr>
                    <tr class="fine-row">
                        <td>Late Fine (After 10th)</td>
                        <td>${fineAmount.toLocaleString()}</td>
                    </tr>
                    <tr class="total-row">
                        <td>NET AFTER DUE DATE</td>
                        <td>Rs. ${netAfterDue.toLocaleString()}</td>
                    </tr>
                </tbody>
            </table>
            <div style="margin-top:10px; font-size:10px; border:1px solid #ccc; padding:4px;">
                <strong>Note:</strong> Please submit fee by the 10th to avoid late fee fine 
            </div>
            <div class="footer">
                <div class="sig-line">Parent/Bank</div>
                <div class="sig-line">Cashier/Principal</div>
            </div>
        </div>
    `).join('');
    container.appendChild(page);
}

// Start the process
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
